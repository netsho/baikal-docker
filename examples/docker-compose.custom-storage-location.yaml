# Docker Compose file for a Baikal server

version: "2"
services:
  baikal:
    image: ghcr.io/aalmenar/baikal:nginx
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - data:/var/www/baikal/Specific
      - config:/var/www/baikal/config

volumes:
  config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/foo/baikal/config
  data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/foo/baikal/Specific
